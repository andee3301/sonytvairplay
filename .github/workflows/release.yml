name: Build and publish release APKs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline.zip
          unzip -q /tmp/cmdline.zip -d $HOME/android-sdk/cmdline-tools
          mkdir -p $HOME/android-sdk/cmdline-tools/latest
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/ || true
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk --licenses
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk "platform-tools" "platforms;android-33" "build-tools;33.0.2" "cmake;3.10.2.4988404" "ndk;21.4.7075529"

      - name: Optional: download ffmpeg-kit native libs
        run: |
          if [ -z "${{ secrets.FFMPEG_KIT_DOWNLOAD_URL }}" ]; then
            echo "FFMPEG_KIT_DOWNLOAD_URL not set; skipping ffmpeg native libs download"
          else
            mkdir -p app/src/main/cpp/libs
            wget -q -O /tmp/ffmpegkit.zip "${{ secrets.FFMPEG_KIT_DOWNLOAD_URL }}"
            unzip -q /tmp/ffmpegkit.zip -d /tmp/ffmpegkit
            # copy common ffmpeg libs into expected directories
            for libname in libavcodec.so libavformat.so libavutil.so libswresample.so libswscale.so; do
              find /tmp/ffmpegkit -type f -name "${libname}" -print0 | while IFS= read -r -d '' libfile; do
                abi=$(basename "$(dirname "$libfile")")
                dest="app/src/main/cpp/libs/${abi}"
                mkdir -p "$dest"
                cp "$libfile" "$dest"/
              done
            done
            echo "Copied ffmpeg native libs to app/src/main/cpp/libs/*"
          fi

      - name: Build APKs
        env:
          ANDROID_SDK_ROOT: ${{ env.HOME }}/android-sdk
        run: |
          chmod +x gradlew || true
          ./gradlew clean assembleDebug assembleRelease --no-daemon

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          release_name: Release ${{ github.event.inputs.tag || github.ref_name }}
          body: "Automated release: debug and unsigned release APKs"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug APK
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/build/outputs/apk/debug/app-debug.apk
          asset_name: app-debug.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload unsigned release APK
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/build/outputs/apk/release/app-release-unsigned.apk
          asset_name: app-release-unsigned.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
